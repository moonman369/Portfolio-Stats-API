services:
  api:
    # Image is built and pushed to GHCR by .github/workflows/deploy.yml.
    # The VM only pulls this image — it does not build.
    image: ghcr.io/moonman369/portfolio-stats-api:latest
    container_name: portfolio-stats-api
    env_file:
      - ./.env
    ports:
      # Bind to loopback only: Nginx reverse-proxies to localhost on this port,
      # so the app is never exposed publicly and no VM firewall rule is needed.
      - "127.0.0.1:8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
